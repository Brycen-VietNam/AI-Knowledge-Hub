services:
  postgres:
    # Official pgvector image = PostgreSQL 17 + pgvector extension pre-installed
    # pgvector enabled per-DB via: CREATE EXTENSION IF NOT EXISTS vector (migration 002)
    image: pgvector/pgvector:pg17
    container_name: knowledge-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledge_hub
      POSTGRES_USER: kh_user
      POSTGRES_PASSWORD: kh_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kh_user -d knowledge_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: knowledge-hub-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  valkey_data:
