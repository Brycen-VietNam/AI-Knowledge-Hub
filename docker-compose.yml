services:
  postgres:
    # Official pgvector image = PostgreSQL 17 + pgvector extension pre-installed
    # pgvector enabled per-DB via: CREATE EXTENSION IF NOT EXISTS vector (migration 002)
    image: pgvector/pgvector:pg17
    container_name: knowledge-hub-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: knowledge_hub
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d knowledge_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: knowledge-hub-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: knowledge-hub-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    container_name: knowledge-hub-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/knowledge_hub
      VALKEY_URL: valkey://valkey:6379
      OLLAMA_EMBED_URL: http://ollama:11434
      OLLAMA_LLM_URL: http://ollama:11434
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-oss-120b:free}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_TIMEOUT_S: 30.0
      LLM_TIMEOUT_OVERRIDE: 30.0
      RETRIEVAL_TIMEOUT_OVERRIDE: 15.0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  postgres_data:
  valkey_data:
  ollama_data:
